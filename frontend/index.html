<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Flights Map</title>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(245, 185, 8, 0.14), transparent 26%),
          linear-gradient(180deg, #1b1f23 0%, #0d1013 100%);
        color: #eef2f7;
        font-family:
          "Barlow Semi Condensed",
          "IBM Plex Sans",
          "Segoe UI",
          sans-serif;
      }

      #boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      #boot-fallback[hidden] {
        display: none;
      }

      .boot-card {
        width: min(100%, 440px);
        padding: 24px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(17, 19, 23, 0.94);
        box-shadow: 0 18px 34px rgba(0, 0, 0, 0.28);
      }

      .boot-badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #171a1f;
        background: linear-gradient(180deg, #ffd34f 0%, #f5b908 100%);
      }

      #boot-fallback[data-state="error"] .boot-badge {
        color: #ffd7d7;
        background: rgba(122, 35, 35, 0.9);
      }

      .boot-title {
        margin: 12px 0 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .boot-copy {
        margin: 12px 0 0;
        font-size: 15px;
        line-height: 1.5;
        color: rgba(205, 215, 226, 0.82);
      }
    </style>
  </head>
  <body>
    <div id="boot-fallback" data-state="loading" role="status" aria-live="polite">
      <div class="boot-card">
        <span class="boot-badge" data-boot-badge>Loading</span>
        <h1 class="boot-title">Starting radar UI</h1>
        <p class="boot-copy" data-boot-message>
          Loading the frontend bundle. If this screen stays visible after deploy, check the browser
          Console and Network tabs for failed JavaScript assets.
        </p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
